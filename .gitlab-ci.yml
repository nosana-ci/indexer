include:
  - project: nosana-ci/tools/cicd/gitlab-ci
    file: docker-container.yml

variables:
  CONTAINER_PLATFORMS: linux/amd64
  DOCKERFILE_DIR: .
  RUN_AUTO_BUMP: ok
  AUTO_BUMP_REPO: nosana-ci/apps/platform/k8s
  AUTO_BUMP_FILE: helm-blockchain-indexer.tf
  AUTO_BUMP_SCG_PREFIX: image_tag [^}]*= { dev = \"

bun install:
  image: oven/bun:1.3.8-alpine
  stage: build
  script:
    - bun install --frozen-lockfile
  artifacts:
    untracked: true
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

quality:
  image: oven/bun:1.3.8-alpine
  stage: test
  dependencies:
    - bun install
  script:
    - bun run typecheck
    - bun run lint
    - bun run format:check
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

bun test:
  image: oven/bun:1.3.8-alpine
  stage: test
  dependencies:
    - bun install
  script:
    - bun run ci:test
  coverage: '/All files[^|]*\|[^|]*\|[^|]*\|[^|]*\|[^\d]*([\d\.]+)/'
  artifacts:
    when: always
    paths:
      - junit.xml
    reports:
      junit: junit.xml
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

scenario test:
  stage: test
  image: docker:24.0.7
  before_script: []
  services:
    - name: docker:24.0.7-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: "0"
    DOCKER_CERT_PATH: ""
  script:
    - export DOCKER_TLS_CERTDIR=
    - export DOCKER_TLS_VERIFY=
    - export DOCKER_CERT_PATH=
    - apk add --no-cache bash curl unzip libstdc++ libgcc
    - curl -fsSL https://bun.sh/install | bash
    - export PATH="$HOME/.bun/bin:$PATH"
    - bun install --frozen-lockfile
    - bun run test:scenarios
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

auto deploy prd:
  stage: .post
  extends: .auto-deploy
  variables:
    AUTO_BUMP_SCG_PREFIX: image_tag [^}]* prd = \"
  when: manual