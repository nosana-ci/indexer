name: blockchain-indexer

x-common-env: &common-env
  APP_ENV: development
  SOLANA_NETWORK: ${SOLANA_NETWORK:-localnet}
  SOLANA_RPC: ${SOLANA_RPC:-http://localnet:8899}
  SOLANA_WS: ${SOLANA_WS:-ws://localnet:8900}
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: nosana_indexer
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432

x-common-service: &common-service
  image: oven/bun:1.3.8-alpine
  command: bun run dev
  working_dir: /code
  volumes:
    - ../:/code:cached
  depends_on:
    db:
      condition: service_healthy
    localnet:
      condition: service_healthy
  links:
    - db
    - localnet
  networks:
    - deployments_network

services:
  api:
    <<: *common-service
    ports:
      - 3003:3003
    environment:
      <<: *common-env
      APP_MODE: api
      PORT: 3003

  indexer:
    <<: *common-service
    ports:
      - 3004:3004
    environment:
      <<: *common-env
      APP_MODE: indexer
      PORT: 3004

  cron:
    <<: *common-service
    ports:
      - 3005:3005
    environment:
      <<: *common-env
      APP_MODE: cron
      PORT: 3005

  blockchain-indexer:
    <<: *common-service
    profiles:
      - legacy
    ports:
      - 3006:3006
    environment:
      <<: *common-env
      APP_MODE: all
      PORT: 3006

  localnet:
    image: nosana/localnet:latest
    ports:
      - 8899:8899
      - 8900:8900
    healthcheck:
      test: ['CMD', 'solana', 'cluster-version', '--url', 'http://127.0.0.1:8899']
      interval: 2s
      timeout: 5s
      retries: 20
    networks:
      deployments_network:
        aliases:
          - localnet

  db:
    image: postgres:18
    restart: always
    ports:
      - 5434:5432
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nosana_indexer
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -d nosana_indexer -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      deployments_network:
        aliases:
          - db

  adminer:
    image: adminer:4.8.1
    ports:
      - 8084:8080
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ADMINER_DEFAULT_SERVER=db
    volumes:
      - ./adminer-php.ini:/usr/local/etc/php/conf.d/99-session.ini:ro
    networks:
      - deployments_network

volumes:
  pgdata:

networks:
  deployments_network:
    external: true
